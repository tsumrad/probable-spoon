name: Security Vulnerability Remediation

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: >
          Base branch to create rollup branches from.
          Leave empty to use the repository default branch.
        required: false
        default: ''
        type: string

      severities:
        description: >
          Comma-separated list of severities to process.
        required: false
        default: 'critical,high,medium,low'
        type: string

      dry_run:
        description: >
          Analyze vulnerabilities without creating rollup branches,
          pull requests, or tracking issues.
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: write
  vulnerability-alerts: read

jobs:
  security-rollup:
    uses: tsumrad/shared-gha-tools/.github/workflows/security-vulnerability-rollup.yml@agent-remediation
    with:
      base_branch: ${{ inputs.base_branch }}
      severities: ${{ inputs.severities }}
      dry_run: ${{ inputs.dry_run }}
